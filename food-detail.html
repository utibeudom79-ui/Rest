<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Food — Ember & Spice</title>
  <link rel="stylesheet" href="africankit.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <nav class="navbar scrolled" id="navbar">
    <div class="logo">Ember <span>&</span> Spice</div>
    <ul class="nav-links">
      <li><a href="africankit.html">Home</a></li>
      <li><a href="menu.html" class="active">Menu</a></li>
      <li><a href="services.html">Services</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <a href="contact.html#reserve" class="reserve-btn">Reserve a Table</a>
    <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
  </nav>

  <div class="mobile-menu" id="mobileMenu">
    <ul>
      <li><a href="africankit.html">Home</a></li>
      <li><a href="menu.html">Menu</a></li>
      <li><a href="services.html">Services</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </div>

  <div class="toast" id="toast"></div>

  <div class="detail-page">
    <div class="detail-hero">
      <img id="detailImg" src="" alt="">
      <div class="detail-hero-overlay"></div>
      <a href="menu.html" class="detail-back"><i class="fa-solid fa-arrow-left"></i> Back to Menu</a>
    </div>

    <div class="detail-body">
      <div class="detail-info">
        <h1 class="detail-name" id="detailName"></h1>
        <p class="detail-price" id="detailPrice"></p>
        <p class="detail-desc" id="detailDesc"></p>

        <div class="detail-specs">
          <h4>Dish Details</h4>
          <div class="spec-row"><span>Includes</span><span id="specProtein"></span></div>
          <div class="spec-row"><span>Serves</span><span id="specServes"></span></div>
          <div class="spec-row"><span>Prep Time</span><span id="specPrep"></span></div>
          <div class="spec-row"><span>Category</span><span id="specCat"></span></div>
        </div>
      </div>

      <div class="detail-btns">
        <button class="detail-add-btn" id="detailAddBtn">
          <i class="fa-solid fa-cart-plus"></i> Add to Cart
        </button>
        <button class="detail-order-btn" id="detailOrderBtn">
          <i class="fa-brands fa-whatsapp"></i> Order via WhatsApp
        </button>
        <a href="cart.html" class="cart-bubble" id="cartBubble" style="position:relative;bottom:auto;right:auto;width:100%;border-radius:10px;justify-content:center;background:var(--bone-dark);margin-top:4px;">
          🛒 View Cart (<span id="cartCount">0</span> items)
        </a>
      </div>
    </div>
  </div>

  <script src="menu.js"></script>
  <script>
    document.getElementById('hamburger').addEventListener('click', function() {
      document.getElementById('mobileMenu').classList.toggle('open');
    });
    initDetailPage();
  </script>
</body>
</html>
